name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy
      - run: ruff check src/ projects/ tests/
      - run: mypy src/risk_analyst/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Run tests (each project separately to avoid conftest collisions)
        run: |
          set -e
          # Shared library tests
          pytest tests/ --tb=short -q || test $? -eq 5

          # Run each project's tests in isolation
          for proj in projects/*/tests; do
            if ls "$proj"/test_*.py 1>/dev/null 2>&1; then
              echo "=== Testing $proj ==="
              pytest "$proj" --tb=short -q
            fi
          done
